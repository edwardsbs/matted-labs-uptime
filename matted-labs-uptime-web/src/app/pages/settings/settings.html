<div class="settings-container">
  <div class="page-header">
    <a mat-icon-button routerLink="/">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <h1>Settings</h1>
  </div>

  @if (loading()) {
    <div class="centered"><mat-spinner></mat-spinner></div>
  } @else {
    <mat-card>
      <mat-card-header>
        <mat-card-title>
          <mat-icon class="section-icon">email</mat-icon>
          Email Alerts
        </mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <div class="alerts-toggle-row">
          <mat-slide-toggle [checked]="form().alertsEnabled" (change)="update({ alertsEnabled: $event.checked })">
            Enable email alerts
          </mat-slide-toggle>
          <span class="toggle-hint">Sends an email when a service goes down or recovers</span>
        </div>

        <mat-divider></mat-divider>

        <div class="form-grid" [class.disabled]="!form().alertsEnabled">
          <div class="row-2">
            <mat-form-field appearance="outline">
              <mat-label>SMTP Host</mat-label>
              <input matInput [value]="form().smtpHost"
                     (input)="update({ smtpHost: $any($event.target).value })"
                     placeholder="smtp.gmail.com" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="port-field">
              <mat-label>Port</mat-label>
              <input matInput type="number"
                     [value]="form().smtpPort"
                     (input)="update({ smtpPort: +$any($event.target).value })" />
            </mat-form-field>
          </div>

          <div class="row-2">
            <mat-form-field appearance="outline">
              <mat-label>Username</mat-label>
              <input matInput [value]="form().smtpUser"
                     (input)="update({ smtpUser: $any($event.target).value })"
                     autocomplete="off" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Password</mat-label>
              <input matInput [type]="showPassword() ? 'text' : 'password'"
                     [value]="form().smtpPassword"
                     (input)="update({ smtpPassword: $any($event.target).value })"
                     autocomplete="new-password" />
              <button mat-icon-button matSuffix (click)="showPassword.set(!showPassword())"
                      [matTooltip]="showPassword() ? 'Hide password' : 'Show password'">
                <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>
          </div>

          <div class="row-2">
            <mat-form-field appearance="outline">
              <mat-label>From Address</mat-label>
              <input matInput [value]="form().smtpFrom"
                     (input)="update({ smtpFrom: $any($event.target).value })"
                     placeholder="alerts@yourdomain.com" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Alert Recipient</mat-label>
              <input matInput [value]="form().alertRecipient"
                     (input)="update({ alertRecipient: $any($event.target).value })"
                     placeholder="you@yourdomain.com" />
            </mat-form-field>
          </div>

          <div class="ssl-row">
            <mat-slide-toggle [checked]="form().smtpEnableSsl" (change)="update({ smtpEnableSsl: $event.checked })">
              Enable SSL / TLS
            </mat-slide-toggle>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-stroked-button (click)="sendTestEmail()" [disabled]="sendingTest() || !form().smtpHost">
          @if (sendingTest()) {
            <mat-spinner diameter="18"></mat-spinner>
          } @else {
            <mat-icon>send</mat-icon>
          }
          Send Test Email
        </button>
        <button mat-raised-button color="primary" (click)="save()" [disabled]="saving()" style="margin-left: auto">
          @if (saving()) { <mat-spinner diameter="18"></mat-spinner> }
          Save
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
